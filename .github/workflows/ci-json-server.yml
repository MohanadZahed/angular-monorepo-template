name: CI/CD Pipeline — JSON Server

on:
  push:
    branches: [main]
    paths:
      - 'json-server/**'
      - '.github/workflows/ci-json-server.yml'
  pull_request:
    branches: [main]
    paths:
      - 'json-server/**'
      - '.github/workflows/ci-json-server.yml'

env:
  IMAGE_NAME: mzahed23/json-server

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Push Docker Image
  # No tests — json-server is a thin wrapper, just publish it.
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./json-server
          file: ./json-server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to EC2
  # SSHs in, pulls :latest, replaces the running container.
  # Mounts /home/ec2-user/config.json so feature flags can be
  # edited on the host without rebuilding the image.
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: SSH into EC2 and redeploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull mzahed23/json-server:latest

            docker stop json-server || true
            docker rm   json-server || true

            docker run -d \
              --name json-server \
              --restart unless-stopped \
              -p 3000:3000 \
              -v /home/ec2-user/config.json:/app/config.json \
              mzahed23/json-server:latest

            docker image prune -f
