name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: mzahed23/angular-monorepo-template

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Unit Tests
  # Fast feedback — fail before wasting time on a Docker build
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx nx run-many --target=test --all --ci --passWithNoTests

  # ─────────────────────────────────────────────
  # JOB 2: Build Docker Image → tarball
  # Built once, saved as a pipeline artifact.
  # Never touches Docker Hub — nothing is published yet.
  # ─────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image and export as tarball
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          outputs: type=docker,dest=/tmp/angular-app.tar
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload tarball as pipeline artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/angular-app.tar
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 3: E2E Tests
  # Downloads the exact tarball from job 2, loads it,
  # runs it as a container, Cypress tests against it.
  # ─────────────────────────────────────────────
  e2e-tests:
    name: Cypress E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image from tarball
        run: docker load --input /tmp/angular-app.tar

      - name: Start container
        run: |
          docker run -d \
            --name angular-monorepo-template-test \
            -p 4200:4000 \
            ${{ env.IMAGE_NAME }}:latest

      - name: Wait for SSR server to be ready
        run: |
          for i in {1..30}; do
            curl -s http://localhost:4200 && break
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Run Cypress E2E tests
        run: npx nx e2e e2e --configuration=ci

      - name: Print container logs on failure
        if: failure()
        run: docker logs angular-monorepo-template-test

      - name: Upload Cypress screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Stop and remove test container
        if: always()
        run: |
          docker stop angular-monorepo-template-test || true
          docker rm   angular-monorepo-template-test || true

  # ─────────────────────────────────────────────
  # JOB 4: Push Docker Image
  # Downloads the same tarball that was tested in job 3,
  # loads it and pushes it — no rebuild whatsoever.
  # ─────────────────────────────────────────────
  push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image from tarball
        run: docker load --input /tmp/angular-app.tar

      - name: Tag and push to Docker Hub
        run: |
          docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

  # ─────────────────────────────────────────────
  # JOB 5: Deploy to EC2
  # SSHs in, pulls :latest, replaces the running container.
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: SSH into EC2 and redeploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull mzahed23/angular-monorepo-template:latest

            docker stop angular-monorepo-template || true
            docker rm   angular-monorepo-template || true

            docker run -d \
              --name angular-monorepo-template \
              --restart unless-stopped \
              -p 80:4000 \
              mzahed23/angular-monorepo-template:latest

            docker image prune -f