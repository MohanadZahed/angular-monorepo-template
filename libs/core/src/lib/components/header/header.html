<header class="app-header">
  <a class="app-brand" routerLink="/">Angular MF</a>

  @if (isLoggedIn()) {
  <nav class="app-nav" aria-label="Main navigation">
    @if (showStatistics) {
    <a routerLink="/statistics" routerLinkActive="active"
      >{{ 'nav.statistics' | t }}</a
    >
    } @if (showInvoices) {
    <a routerLink="/invoices" routerLinkActive="active"
      >{{ 'nav.invoices' | t }}</a
    >
    } @if (showOrders) {
    <a routerLink="/orders" routerLinkActive="active">{{ 'nav.orders' | t }}</a>
    } @if (isAdmin()) {
    <a routerLink="/admin/feature-flags" routerLinkActive="active"
      >{{ 'nav.featureFlags' | t }}</a
    >
    }
  </nav>
  }

  <div class="app-header-actions">
    <lib-language-toggle />
    <button
      class="btn--theme-toggle"
      type="button"
      [attr.aria-label]="themeToggleLabel()"
      [attr.aria-pressed]="isDark()"
      (click)="toggleTheme()"
    >
      <span aria-hidden="true">{{ isDark() ? '☾' : '☀' }}</span>
    </button>
    @if (isLoggedIn()) {
    <button class="btn btn--logout" type="button" (click)="logout()">
      {{ 'header.logout' | t }}
    </button>
    }
  </div>
</header>

<div class="sr-only" aria-live="polite" aria-atomic="true">
  {{ authAnnouncement() }}
</div>
